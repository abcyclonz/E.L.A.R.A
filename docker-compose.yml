services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: pgvector/pgvector:pg16
    container_name: memory_db
    environment:
      POSTGRES_USER: memory_user
      POSTGRES_PASSWORD: memory_pass
      POSTGRES_DB: memory_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./agents/memory/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_user -d memory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  memory_agent:
    build: ./agents/memory
    container_name: memory_agent
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://memory_user:memory_pass@db:5432/memory_db
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:latest}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./agents/memory/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  elara:
    build: ./agents/elara
    container_name: elara
    ports:
      - "8002:8002"
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:latest}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      ALERT_FROM_EMAIL: ${ALERT_FROM_EMAIL:-}
      ALERT_TO_EMAIL: ${ALERT_TO_EMAIL:-}
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - elara_bandit_tables:/app/tables
      - ./agents/elara/conversation_agent:/app/conversation_agent
      - ./agents/elara/learning_agent:/app/learning_agent
    command: uvicorn app:app --host 0.0.0.0 --port 8002 --reload

  web_search_tool:
    build: ./agents/tools/web_search
    container_name: web_search_tool
    ports:
      - "8010:8010"
    environment:
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      PORT: 8010

  assistant_tool:
    build: ./agents/tools/assistant
    container_name: assistant_tool
    ports:
      - "8011:8011"
    environment:
      DB_PATH: /data/assistant.db
      PORT: 8011
      GOOGLE_AUTH_DIR: /app/google_auth
      CALENDAR_TIMEZONE: Asia/Kolkata
    volumes:
      - assistant_data:/data
      - ./agents/tools/assistant/google_auth:/app/google_auth:ro

  orchestrator:
    build: ./agents/orchestrator
    container_name: orchestrator
    ports:
      - "8001:8001"
    environment:
      MEMORY_AGENT_URL: http://memory_agent:8000
      ELARA_URL: http://elara:8002
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:latest}
      WEB_SEARCH_MCP_URL: http://web_search_tool:8010
      ASSISTANT_MCP_URL: http://assistant_tool:8011
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-elara-dev-secret-change-in-prod}
    depends_on:
      - memory_agent
      - elara
      - web_search_tool
      - assistant_tool
      - redis
      - ollama
    volumes:
      - ./agents/orchestrator/app:/app/app
      - auth_data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator
    environment:
      NODE_ENV: production
      BACKEND_URL: http://orchestrator:8001

volumes:
  postgres_data:
  elara_bandit_tables:
  assistant_data:
  redis_data:
  auth_data:
  ollama_models:
